services:
  - type: web
    name: openclaw
    runtime: image
    image:
      url: ghcr.io/openclaw/openclaw:latest
    plan: starter
    region: frankfurt
    healthCheckPath: /health
    startCommand: >
      mkdir -p /data/.openclaw &&
      echo '{"gateway":{"mode":"local","port":8080,"bind":"lan"}}' > /data/.openclaw/openclaw.json &&
      node openclaw.mjs gateway --allow-unconfigured --bind lan --port 8080
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
