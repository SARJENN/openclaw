services:
  - type: web
    name: openclaw
    runtime: image
    image:
      url: ghcr.io/openclaw/openclaw:latest
    plan: starter
    region: frankfurt
    healthCheckPath: /health
    startCommand: >-
      mkdir -p /home/node/.openclaw &&
      echo '{"gateway":{"mode":"local","bind":"lan"}}' > /home/node/.openclaw/openclaw.json &&
      node /app/dist/index.js gateway --allow-unconfigured --bind lan --port $PORT
    envVars:
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /home/node/.openclaw
      sizeGB: 1
